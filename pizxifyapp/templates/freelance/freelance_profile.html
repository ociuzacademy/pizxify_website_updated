{% extends 'freelance/freelance_dashboard.html' %}

{% block content %}

<div class="container py-5">

    <div class="card shadow border-0">

        <div class="card-body text-center">

            {% if user.profile_pic %}

            <img src="{{ user.profile_pic.url }}"
                 class="rounded-circle mb-3"
                 width="150"
                 height="150"
                 style="object-fit:cover;">

            {% else %}

            <img src="https://via.placeholder.com/150"
                 class="rounded-circle mb-3">

            {% endif %}

            <h3>{{ user.full_name }}</h3>

            <p class="text-muted">
                Freelance User
            </p>

            <hr>

            <p>
                <strong>Email:</strong>
                {{ user.email }}
            </p>

            <p>
                <strong>Phone:</strong>
                {{ user.phone }}
            </p>

            <p>
                <strong>Place:</strong>
                {{ user.place }}
            </p>

            <p>
                <strong>Address:</strong>
                {{ user.address }}
            </p>

            <a href="{% url 'update_freelance_profile' %}"
               class="btn btn-primary">

                Edit Profile

            </a>

        </div>

    </div>

</div>

{% endblock %}
