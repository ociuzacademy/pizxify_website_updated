{% extends 'freelance/freelance_dashboard.html' %}

{% block content %}

<div class="container py-5">

    <div class="card shadow border-0">

        <div class="card-header">

            <h4 class="mb-0">
                Update Profile
            </h4>

        </div>

        <div class="card-body">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">

                    <label>
                        Full Name
                    </label>

                    <input type="text"
                           name="full_name"
                           value="{{ user.full_name }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           value="{{ user.email }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Phone
                    </label>

                    <input type="text"
                           name="phone"
                           value="{{ user.phone }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Place
                    </label>

                    <input type="text"
                           name="place"
                           value="{{ user.place }}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>
                        Address
                    </label>

                    <textarea name="address"
                              class="form-control"
                              rows="4">{{ user.address }}</textarea>

                </div>

                <div class="mb-3">

                    <label>
                        Profile Picture
                    </label>

                    <input type="file"
                           name="profile_pic"
                           class="form-control">

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Update Profile

                </button>

                <a href="{% url 'freelance_profile' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
