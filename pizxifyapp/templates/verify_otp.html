{% extends 'index.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h3 class="text-center mb-4">

                        Verify OTP

                    </h3>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Enter OTP

                            </label>

                            <input type="text"
                                   name="otp"
                                   maxlength="6"
                                   class="form-control"
                                   required>

                        </div>

                        <button class="btn btn-success w-100">

                            Verify OTP

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
