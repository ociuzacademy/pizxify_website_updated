{% extends 'index.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h3 class="text-center mb-4">
                        Forgot Password
                    </h3>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>

                        </div>

                        <button class="btn btn-primary w-100">

                            Send OTP

                        </button>
                        <p class="text-center mt-3">
    Don't have an account?
    <a href="{% url 'register' %}">
        Register here
    </a>
</p>
                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
