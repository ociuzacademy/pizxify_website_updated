{% extends 'client/client_dashboard.html' %}

{% block content %}

<div class="container py-4">

    <div class="row">

        {% for folder in folders %}

        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

            <div class="card shadow-sm border-0">

                <div class="card-body text-center">

                    <i class="bi bi-folder-fill text-warning"
                       style="font-size:60px;"></i>

                    <h5 class="mt-3">
                        {{ folder.folder_id }}
                    </h5>

                    <p class="text-muted">
                        By {{ folder.created_by.full_name }}
                    </p>

                    <button
                        class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#folderModal{{ folder.id }}">
                        Open Folder
                    </button>

                </div>

            </div>

        </div>

        <!-- Password Modal -->

        <div class="modal fade"
             id="folderModal{{ folder.id }}">

            <div class="modal-dialog">

                <div class="modal-content">

                    <form method="POST"
                          action="{% url 'folder_access' folder.id %}">

                        {% csrf_token %}

                        <div class="modal-header">

                            <h5>
                                Enter Folder Password
                            </h5>

                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal">
                            </button>

                        </div>

                        <div class="modal-body">

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Folder Password"
                                   required>

                        </div>

                        <div class="modal-footer">

                            <button
                                class="btn btn-primary">
                                Access Folder
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
