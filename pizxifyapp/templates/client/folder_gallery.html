{% extends 'client/client_dashboard.html' %}

{% block content %}

<style>
.folder-header{
    padding:2.4rem 0 1.6rem;
    border-bottom:1px solid var(--line);
    margin-bottom:2.2rem;
}
.folder-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:.75rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--moss);
    display:inline-flex;
    align-items:center;
    gap:.4rem;
}
.folder-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    color:var(--ink);
    margin-top:.4rem;
    margin-bottom:0;
}

.snap-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:3px;
    padding:.6rem .6rem 1.1rem;
    box-shadow:var(--shadow);
    position:relative;
    transition:transform .25s ease;
}
.snap-card:nth-child(odd){ transform:rotate(-0.8deg); }
.snap-card:nth-child(even){ transform:rotate(0.8deg); }
.snap-card:hover{ transform:rotate(0) translateY(-4px); }
.snap-card::before{
    content:"";
    position:absolute;
    top:-9px; left:50%;
    transform:translateX(-50%) rotate(-2deg);
    width:48px; height:16px;
    background:rgba(255,255,255,.55);
    border:1px solid rgba(0,0,0,.05);
    box-shadow:0 2px 3px rgba(0,0,0,.08);
}
.gallery-image{
    border-radius:2px;
    transition:.3s;
    display:block;
    width:100%;
}
.gallery-image:hover{
    transform:scale(1.02);
}
.snap-caption{
    font-family:'Caveat',cursive;
    font-size:1rem;
    color:var(--ink-soft);
    text-align:center;
    margin-top:.5rem;
    margin-bottom:0;
}

.like-btn{
    background:rgba(255,252,246,.9);
    border:1px solid var(--line);
    border-radius:50%;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    box-shadow:0 4px 10px -4px rgba(34,34,31,.35);
}
.like-btn:hover{
    background:var(--surface);
}
.like-btn .text-danger{
    color:var(--coral) !important;
}

.empty-folder{
    background:var(--paper-deep);
    border:1px dashed var(--line);
    border-radius:8px;
    padding:2.4rem 1.5rem;
    text-align:center;
    color:var(--ink-soft);
    font-family:'Inter',sans-serif;
}
.empty-folder i{
    font-size:1.6rem;
    color:var(--ink-soft);
    margin-bottom:.6rem;
    display:block;
}
</style>

<div class="container-fluid py-4">

    <div class="folder-header">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>

                <span class="folder-eyebrow">
                    <i class="bi bi-folder2-open"></i>
                    Folder
                </span>

                <h3 class="folder-title">
                    {{ folder.folder_id }}
                </h3>

            </div>

            <div class="mt-3 mt-md-0">

                <a href="{% url 'client_albums' folder.id %}"
                class="btn btn-success">

                    <i class="bi bi-images"></i>
                    View Albums

                </a>

            </div>

        </div>

    </div>
    <div class="row">

        {% for photo in photos %}

        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

            <div class="snap-card position-relative">

                <img src="{{ photo.image.url }}"
                     class="gallery-image"
                     style="height:250px;object-fit:cover;cursor:pointer;"
                     data-bs-toggle="modal"
                     data-bs-target="#imageModal"
                     data-image="{{ photo.image.url }}">

                <button type="button"
                        class="like-btn position-absolute top-0 end-0 m-2"
                        data-id="{{ photo.id }}">

                    {% if photo.is_liked %}
                        <i class="bi bi-heart-fill text-danger"></i>
                    {% else %}
                        <i class="bi bi-heart"></i>
                    {% endif %}

                </button>

            </div>

        </div>

        {% empty %}

        <div class="col-12">
            <div class="empty-folder">
                <i class="bi bi-images"></i>
                No photos found in this folder yet.
            </div>
        </div>

        {% endfor %}

    </div>

</div>

<!-- Image Modal -->
<div class="modal fade" id="imageModal" tabindex="-1">

    <div class="modal-dialog modal-xl modal-dialog-centered">

        <div class="modal-content border-0">

            <div class="modal-header">

                <h5 class="modal-title">
                    Photo Preview
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body text-center">

                <img id="modalImage"
                     src=""
                     class="img-fluid rounded">

            </div>

        </div>

    </div>

</div>

<script>

// Image Preview
document.querySelectorAll('.gallery-image').forEach(function(img){

    img.addEventListener('click', function(){

        document.getElementById('modalImage').src =
            this.getAttribute('data-image');

    });

});


// Like / Unlike
document.querySelectorAll('.like-btn').forEach(btn => {

    btn.addEventListener('click', function(e){

        e.preventDefault();

        const photoId = this.dataset.id;
        const icon = this.querySelector('i');

        fetch(`/toggle-like/${photoId}/`)
        .then(response => response.json())
        .then(data => {

            if(data.status === 'liked'){

                icon.classList.remove('bi-heart');
                icon.classList.add('bi-heart-fill');
                icon.classList.add('text-danger');

            }else{

                icon.classList.remove('bi-heart-fill');
                icon.classList.remove('text-danger');
                icon.classList.add('bi-heart');

            }

        });

    });

});

</script>

{% endblock %}
