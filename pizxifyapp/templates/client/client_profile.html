{% extends 'client/client_dashboard.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-dark text-white">

                    <h4 class="mb-0">
                        My Profile
                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="text-center mb-4">

                            {% if user.profile_pic %}

                            <img src="{{ user.profile_pic.url }}"
                                 class="rounded-circle"
                                 width="150"
                                 height="150"
                                 style="object-fit:cover;">

                            {% else %}

                            <img src="https://via.placeholder.com/150"
                                 class="rounded-circle">

                            {% endif %}

                        </div>

                        <div class="mb-3">

                            <label>
                                Full Name
                            </label>

                            <input type="text"
                                   name="full_name"
                                   value="{{ user.full_name }}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>
                                Email
                            </label>

                            <input type="email"
                                   name="email"
                                   value="{{ user.email }}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>
                                Phone
                            </label>

                            <input type="text"
                                   name="phone"
                                   value="{{ user.phone }}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>
                                Place
                            </label>

                            <input type="text"
                                   name="place"
                                   value="{{ user.place }}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>
                                Address
                            </label>

                            <textarea name="address"
                                      rows="3"
                                      class="form-control">{{ user.address }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label>
                                Profile Picture
                            </label>

                            <input type="file"
                                   name="profile_pic"
                                   class="form-control">

                        </div>

                        <button type="submit"
                                class="btn btn-success">

                            Update Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
